name: fitness-backend CI

on:
  pull_request:
    paths:
      - "fitness-backend/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "fitness-backend/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: fitness-backend

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://fitness:fitness@localhost:5432/fitness
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fitness
          POSTGRES_PASSWORD: fitness
          POSTGRES_DB: fitness
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitness -d fitness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: fitness-backend/pyproject.toml

      - name: Install package and dev tools
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app

      - name: Alembic upgrade
        run: alembic upgrade head

      - name: Pytest
        run: pytest
